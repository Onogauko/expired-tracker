<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expired Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .sync-indicator {
      width: 12px;
      height: 12px;
      border: 2px solid #3b82f6;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen pb-20">

  <div class="max-w-md mx-auto">

    <!-- HEADER -->
    <header class="bg-blue-600 text-white pt-8 pb-12 px-6 rounded-b-[2.5rem] shadow-xl text-center">
      <h1 class="text-2xl font-extrabold tracking-tight">
        EXPIRED TRACKER
      </h1>

      <p class="text-blue-100 text-xs font-bold uppercase tracking-widest mt-1">
        Manajemen Stok Mobile
      </p>
    </header>

    <!-- TAB -->
    <div class="px-5 -mt-6 mb-4">
      <div class="flex bg-white p-1 rounded-2xl shadow-lg border border-slate-200">

        <button
          onclick="switchView('input')"
          id="tab-input"
          class="flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl transition-all bg-blue-600 text-white shadow-md">
          Input
        </button>

        <button
          onclick="switchView('history')"
          id="tab-history"
          class="flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl transition-all text-slate-400">
          Riwayat
        </button>

      </div>
    </div>

    <!-- INPUT VIEW -->
    <div id="view-input" class="p-5 space-y-6">

      <div class="bg-white p-3 rounded-2xl shadow-lg border border-slate-200">

        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-2">
          SKU
        </label>

        <input
          type="text"
          id="sku"
          placeholder="SKU"
          class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none font-bold">

      </div>

      <form
        id="inputForm"
        class="bg-white p-6 rounded-[2rem] shadow-lg space-y-5 border border-slate-200">

        <div>

          <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">
            Description
          </label>

          <input
            type="text"
            id="desc"
            required
            placeholder="Nama Barang"
            class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold">

        </div>

        <div class="grid grid-cols-2 gap-4">

          <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">
              Qty
            </label>

            <input
              type="number"
              id="qty"
              required
              placeholder="0"
              class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold">
          </div>

          <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">
              PIC
            </label>

            <input
              type="text"
              id="pic"
              required
              placeholder="Nama"
              class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold uppercase">
          </div>

        </div>

        <div>

          <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">
            Expired Date
          </label>

          <input
            type="date"
            id="expiredDate"
            required
            class="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-2xl font-black text-blue-900 outline-none">

        </div>

        <button
          type="submit"
          class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-extrabold text-lg shadow-lg">

          SIMPAN DATA

        </button>

      </form>

    </div>

    <!-- HISTORY -->
    <div id="view-history" class="hidden p-5 space-y-4">

      <div class="flex justify-between items-center px-2">

        <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest">
          Riwayat
        </h2>

        <button
          onclick="loadHistory()"
          class="text-[10px] font-bold text-blue-600 uppercase">
          Refresh
        </button>

      </div>

      <div id="history-list" class="space-y-3"></div>

    </div>

    <!-- NOTIF -->
    <div
      id="notif"
      class="fixed bottom-6 left-6 right-6 hidden text-center p-4 rounded-2xl font-bold text-sm z-[100] shadow-2xl">
    </div>

  </div>

  <script>

    const API_URL = "https://script.google.com/macros/s/AKfycbx0TkK_9WokaWidnOpKj5rCWQg_FWXk5l_DrqKsceMgh_ESO56V2QIj5BM3hUlk-vMZWg/exec";

    window.onload = function () {
      loadHistory();
    };

    function switchView(v) {

      document.getElementById('view-input')
        .classList.toggle('hidden', v !== 'input');

      document.getElementById('view-history')
        .classList.toggle('hidden', v !== 'history');

      document.getElementById('tab-input').className =
        v === 'input'
        ? "flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl bg-blue-600 text-white shadow-md"
        : "flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl text-slate-400";

      document.getElementById('tab-history').className =
        v === 'history'
        ? "flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl bg-blue-600 text-white shadow-md"
        : "flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl text-slate-400";

      if (v === 'history') {
        loadHistory();
      }
    }

    async function loadHistory() {

      const res = await fetch(API_URL);

      const data = await res.json();

      renderHistory(data);

    }

    function renderHistory(data) {

      const list = document.getElementById('history-list');

      if (!data || data.length === 0) {

        list.innerHTML = `
          <div class="text-center py-10 text-slate-400 text-xs font-medium">
            Belum ada data.
          </div>
        `;

        return;
      }

      list.innerHTML = data.reverse().map(item => `

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-2">

          <div class="flex justify-between items-start">

            <div>
              <div class="text-[10px] font-black text-blue-500 uppercase tracking-tighter">
                ${item.sku}
              </div>

              <div class="text-sm font-bold text-slate-800 leading-tight">
                ${item.desc}
              </div>
            </div>

            <div class="text-right">
              <div class="text-[10px] font-bold text-slate-400 uppercase">
                ${item.pic}
              </div>

              <div class="text-[10px] font-black text-slate-900">
                QTY: ${item.qty}
              </div>
            </div>

          </div>

          <div class="pt-2 border-t border-slate-50">

            <div class="text-[10px] font-bold text-red-500 uppercase tracking-widest">
              EXP: ${item.expired}
            </div>

          </div>

        </div>

      `).join('');

    }

    function showNotif(message, color) {

      const n = document.getElementById('notif');

      n.className =
        `fixed bottom-8 left-6 right-6 p-4 rounded-2xl shadow-2xl z-[100] text-white font-bold text-sm text-center bg-${color}-500`;

      n.innerText = message;

      n.classList.remove('hidden');

      setTimeout(() => {
        n.classList.add('hidden');
      }, 3000);

    }

    document.getElementById('inputForm').onsubmit = async function(e) {

      e.preventDefault();

      const data = {

        sku: document.getElementById('sku').value,

        desc: document.getElementById('desc').value,

        qty: document.getElementById('qty').value,

        pic: document.getElementById('pic').value,

        expired: document.getElementById('expiredDate').value

      };

      showNotif("Menyimpan...", "blue");

      await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(data)
      });

      showNotif("Data Berhasil Disimpan!", "emerald");

      document.getElementById('inputForm').reset();

      loadHistory();

    };

  </script>

</body>
</html>
