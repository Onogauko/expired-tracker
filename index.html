<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expired Tracker Pro</title>
    
    <!-- PWA Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ExpTracker">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2907/2907150.png">
    <meta name="theme-color" content="#1e40af">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
        }
        .tab-active { 
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white; 
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); 
        }
        .tab-inactive { color: #64748b; font-weight: 600; }
        .hide { display: none !important; }
        
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .card-stat {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-stat:active { transform: scale(0.95); }

        input:focus {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .gradient-header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }

        /* Custom style for Date Input */
        input[type="date"] {
            position: relative;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
            height: auto;
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen pb-32">

    <div class="max-w-md mx-auto relative min-h-screen bg-slate-50/50 shadow-[0_0_50px_rgba(0,0,0,0.1)] border-x border-slate-100">
        
        <!-- Header Section -->
        <header class="gradient-header text-white pt-6 pb-12 px-7 rounded-b-[2rem] shadow-2xl relative overflow-hidden">
            <div class="absolute -top-10 -right-10 opacity-10 pointer-events-none">
                <i data-lucide="shield-check" size="200"></i>
            </div>
            
            <div class="flex justify-between items-center relative z-10">
                <div class="text-left">
                    <h1 class="text-lg font-extrabold tracking-tight uppercase leading-none">Expired Tracker</h1>
                    <div class="mt-1.5 space-y-0.5">
                        <p id="header-last-date" class="text-blue-100 text-[6.5px] font-bold uppercase tracking-wider opacity-80">Terakhir diinput : ---</p>
                        <p id="header-last-pic" class="text-blue-100 text-[6.5px] font-bold uppercase tracking-wider opacity-80">Oleh : ---</p>
                        <!-- Informasi Waktu Baru -->
                        <p id="header-last-time" class="text-blue-100 text-[6.5px] font-bold uppercase tracking-wider opacity-80">Waktu : ---</p>
                    </div>
                </div>
                
                <button onclick="switchTab('master')" class="p-2 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-lg border border-white/20 transition-all active:scale-90 flex flex-col items-center group">
                    <i data-lucide="database" class="w-3.5 h-3.5 text-white group-hover:rotate-12 transition-transform"></i>
                    <span class="text-[6.5px] font-extrabold uppercase tracking-tighter mt-0.5">Database</span>
                </button>
            </div>
        </header>

        <div class="px-5 -mt-6 mb-8 relative z-20">
            <div class="flex bg-white/90 backdrop-blur-md p-1.5 rounded-[2rem] shadow-xl border border-white">
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="flex-1 py-3 text-[10px] font-extrabold uppercase tracking-widest rounded-[1.5rem] transition-all duration-300 tab-active">Beranda</button>
                <button onclick="switchTab('input')" id="btn-input" class="flex-1 py-3 text-[10px] font-extrabold uppercase tracking-widest rounded-[1.5rem] transition-all duration-300 tab-inactive">Input</button>
                <button onclick="switchTab('history')" id="btn-history" class="flex-1 py-3 text-[10px] font-extrabold uppercase tracking-widest rounded-[1.5rem] transition-all duration-300 tab-inactive">Laporan</button>
            </div>
        </div>

        <main id="app-content" class="pb-10">
            
            <!-- Dashboard View -->
            <section id="view-dashboard" class="px-6 space-y-5 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm col-span-2 flex justify-between items-center card-stat relative overflow-hidden group">
                        <div class="absolute right-0 bottom-0 opacity-5 group-hover:scale-110 transition-transform">
                            <i data-lucide="package" size="80"></i>
                        </div>
                        <div>
                            <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Total Monitored</p>
                            <div id="stat-total" class="text-4xl font-extrabold text-slate-800">0</div>
                        </div>
                        <div class="p-5 bg-blue-50 text-blue-600 rounded-[2rem] shadow-inner"><i data-lucide="package" class="w-8 h-8"></i></div>
                    </div>
                    
                    <div class="bg-slate-900 p-5 rounded-[2rem] shadow-lg card-stat">
                        <p class="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Sudah Expired</p>
                        <div id="stat-expired" class="text-3xl font-extrabold text-white">0</div>
                        <div class="h-1.5 w-12 bg-white/20 rounded-full mt-2"></div>
                    </div>

                    <div class="bg-white p-5 rounded-[2rem] border border-red-100 shadow-sm card-stat">
                        <p class="text-[9px] font-extrabold text-red-400 uppercase tracking-widest mb-1">H-7 Kritis</p>
                        <div id="stat-h7" class="text-3xl font-extrabold text-red-600">0</div>
                        <div class="h-1.5 w-12 bg-red-100 rounded-full mt-2"></div>
                    </div>
                    
                    <div class="bg-white p-5 rounded-[2rem] border border-orange-100 shadow-sm card-stat">
                        <p class="text-[9px] font-extrabold text-orange-500 uppercase tracking-widest mb-1">H-30 Waspada</p>
                        <div id="stat-h30" class="text-3xl font-extrabold text-orange-600">0</div>
                        <div class="h-1.5 w-12 bg-orange-100 rounded-full mt-2"></div>
                    </div>

                    <div class="bg-white p-5 rounded-[2rem] border border-blue-100 shadow-sm card-stat">
                        <p class="text-[9px] font-extrabold text-blue-500 uppercase tracking-widest mb-1">H-90 Monitor</p>
                        <div id="stat-h90" class="text-3xl font-extrabold text-blue-600">0</div>
                        <div class="h-1.5 w-12 bg-blue-100 rounded-full mt-2"></div>
                    </div>
                </div>

                <div class="pt-2">
                    <div class="flex justify-between items-center mb-3 px-2">
                        <h2 class="text-[11px] font-extrabold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="zap" class="w-3.5 h-3.5 text-blue-600"></i> Paling Mendesak
                        </h2>
                        <button onclick="switchTab('history')" class="text-[9px] font-bold text-blue-600 uppercase">Lihat Semua</button>
                    </div>
                    <div id="dashboard-quick-list" class="space-y-3">
                        <div class="text-center py-8 bg-white/40 rounded-[2rem] border border-dashed border-slate-200">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Belum ada data kritis</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Input View -->
            <section id="view-input" class="hide px-6 space-y-6 animate-in fade-in slide-in-from-right-4 duration-300">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100">
                    <div class="flex items-center gap-2 mb-4 px-1">
                        <i data-lucide="search" class="w-3.5 h-3.5 text-blue-600"></i>
                        <label class="block text-[10px] font-extrabold text-slate-500 uppercase tracking-[0.2em]">Cari Produk Master</label>
                    </div>
                    <div class="relative">
                        <input type="text" id="master-search-input" oninput="handleMasterSearch(this.value)" placeholder="Ketik SKU atau Nama barang..." class="w-full p-4.5 bg-slate-50 border-2 border-slate-100 focus:border-blue-500 focus:bg-white rounded-2xl outline-none font-bold text-slate-700 transition-all shadow-inner">
                        <div id="search-dropdown" class="absolute w-full mt-3 bg-white border border-slate-100 rounded-[2rem] shadow-2xl z-50 max-h-72 overflow-y-auto hide ring-1 ring-slate-200 divide-y divide-slate-50"></div>
                    </div>
                </div>

                <form id="expiry-form" class="bg-white p-8 rounded-[3rem] shadow-2xl space-y-6 border border-slate-100 opacity-40 pointer-events-none transition-all duration-500 relative">
                    <input type="hidden" id="form-id">
                    <input type="hidden" id="form-sku">
                    <input type="hidden" id="form-desc">
                    
                    <div class="p-5 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-[2rem] shadow-lg shadow-blue-200 flex items-center gap-4 text-white">
                        <div class="p-2.5 bg-white/20 backdrop-blur-md rounded-xl"><i data-lucide="check-square" class="w-5 h-5 text-white"></i></div>
                        <div class="flex-1 overflow-hidden">
                            <div id="display-desc" class="font-extrabold text-sm tracking-tight leading-tight truncate pr-4 uppercase">Menunggu pilihan produk</div>
                            <div id="display-sku" class="text-[10px] text-blue-100 font-bold mt-1.5 uppercase tracking-[0.2em] opacity-80">---</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <div class="flex items-center gap-1.5 px-1">
                                <i data-lucide="box" class="w-3 h-3 text-slate-400"></i>
                                <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Qty</label>
                            </div>
                            <input type="number" id="form-qty" required placeholder="0" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold focus:border-blue-400 outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <div class="flex items-center gap-1.5 px-1">
                                <i data-lucide="user" class="w-3 h-3 text-slate-400"></i>
                                <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">PIC</label>
                            </div>
                            <input type="text" id="form-pic" required placeholder="Nama" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold uppercase focus:border-blue-400 outline-none transition-all">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex items-center gap-1.5 px-1">
                            <i data-lucide="calendar" class="w-3 h-3 text-blue-500"></i>
                            <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Tanggal Kadaluwarsa</label>
                        </div>
                        <div class="relative">
                            <input type="date" id="form-date" required class="w-full p-4 bg-blue-50/50 border-2 border-blue-100 rounded-2xl font-extrabold text-blue-900 focus:border-blue-500 outline-none transition-all appearance-none">
                            <i data-lucide="chevron-down" class="absolute right-4 top-4 text-blue-300 w-5 h-5 pointer-events-none"></i>
                        </div>
                    </div>

                    <button type="submit" id="btn-save" class="w-full py-5 bg-gradient-to-r from-blue-600 to-indigo-700 text-white rounded-[2.2rem] font-extrabold text-md shadow-[0_12px_30px_-5px_rgba(37,99,235,0.5)] active:scale-95 transition-all flex items-center justify-center gap-3">
                        <i data-lucide="save" class="w-5 h-5"></i> SIMPAN DATA
                    </button>
                    
                    <button type="button" onclick="resetForm()" id="btn-cancel" class="hide w-full text-center text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] pt-2 active:text-red-500 transition-colors">Batal Edit</button>
                </form>
            </section>

            <section id="view-history" class="hide px-6 space-y-5 animate-in fade-in slide-in-from-left-4 duration-300">
                <div class="flex justify-between items-center px-2">
                    <div class="text-[11px] font-extrabold text-slate-400 uppercase tracking-[0.2em]">Inventory Log</div>
                    <div class="p-2 bg-white rounded-xl shadow-sm border border-slate-100"><i data-lucide="list-filter" class="w-4 h-4 text-slate-400"></i></div>
                </div>
                <div id="inventory-list" class="space-y-5"></div>
            </section>

            <section id="view-master" class="hide px-6 space-y-6 animate-in fade-in zoom-in-95 duration-300">
                <div class="bg-white p-5 rounded-[2.5rem] shadow-xl border border-slate-100 space-y-4">
                    <div class="flex items-center justify-between gap-4 bg-blue-50/50 p-4 rounded-3xl border border-blue-100">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-extrabold text-blue-700 uppercase tracking-widest">Update Cloud Master</span>
                            <span class="text-[9px] text-blue-400 font-bold mt-0.5">Format: sku, description</span>
                        </div>
                        <input type="file" id="csv-input" accept=".csv" class="hide" onchange="handleCSV(event)">
                        <button onclick="document.getElementById('csv-input').click()" id="btn-csv" class="px-5 py-2.5 bg-blue-600 text-white rounded-2xl font-extrabold text-[10px] flex items-center gap-2 shadow-lg active:scale-95 transition-all">
                            <i data-lucide="upload-cloud" class="w-3.5 h-3.5"></i> IMPORT
                        </button>
                    </div>

                    <div class="relative">
                        <input type="text" oninput="renderMasterList(this.value)" placeholder="Cari SKU..." class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold pl-12 outline-none focus:border-blue-400 transition-all">
                        <i data-lucide="search" class="absolute left-4 top-4 text-slate-300 w-4 h-4"></i>
                    </div>
                </div>

                <div class="flex justify-between items-center px-4">
                    <div id="master-count" class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">0 SKU Terdaftar</div>
                    <button onclick="switchTab('dashboard')" class="text-[10px] font-extrabold text-blue-600 hover:underline">KEMBALI</button>
                </div>
                <div id="master-list" class="space-y-3"></div>
            </section>

        </main>

        <nav class="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-xl border border-white/50 px-8 py-5 flex justify-around items-center z-[100] max-w-md mx-auto rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.15)]">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="p-3 text-blue-600 bg-blue-50 rounded-2xl shadow-inner transition-all"><i data-lucide="layout-grid" class="w-6 h-6"></i></button>
            <button onclick="switchTab('input')" id="nav-input" class="p-3 text-slate-300 transition-all hover:text-blue-400"><i data-lucide="plus-circle" class="w-6 h-6"></i></button>
            <button onclick="switchTab('history')" id="nav-history" class="p-3 text-slate-300 transition-all hover:text-blue-400"><i data-lucide="file-text" class="w-6 h-6"></i></button>
        </nav>

        <div id="notif-box" class="hide fixed bottom-28 left-8 right-8 p-4 rounded-[1.5rem] shadow-2xl z-[150] text-white font-extrabold text-[11px] text-center tracking-wider animate-in slide-in-from-bottom-10 transition-all"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAf24482S97N82pkopYpj1ZJqdOPiwW9g4",
            authDomain: "expired-tracker-pro.firebaseapp.com",
            projectId: "expired-tracker-pro",
            storageBucket: "expired-tracker-pro.firebasestorage.app",
            messagingSenderId: "610264736832",
            appId: "1:610264736832:web:0838a2477519f4dd952ba5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let masterProducts = [];
        let inventoryData = [];

        const showNotif = (msg, type = 'blue') => {
            const box = document.getElementById('notif-box');
            const colors = { emerald: 'bg-emerald-500 shadow-emerald-200', red: 'bg-red-500 shadow-red-200', blue: 'bg-blue-600 shadow-blue-200' };
            box.className = `${colors[type]} fixed bottom-28 left-8 right-8 p-5 rounded-[1.5rem] shadow-2xl z-[150] text-white font-extrabold text-[11px] text-center uppercase tracking-widest`;
            box.innerText = msg;
            box.classList.remove('hide');
            setTimeout(() => box.classList.add('hide'), 3000);
        };

        onSnapshot(query(collection(db, "master_products"), orderBy("sku")), (snap) => {
            masterProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            document.getElementById('master-count').innerText = `${masterProducts.length} SKU TERDAFTAR`;
            renderMasterList();
        });

        onSnapshot(query(collection(db, "inventory_expired"), orderBy("createdAt", "desc")), (snap) => {
            inventoryData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            // Update Header Info dengan data terbaru (Tanggal, Oleh, Waktu)
            if (inventoryData.length > 0) {
                const latest = inventoryData[0];
                let dateStr = "---";
                let timeStr = "---";
                
                // Gunakan createdAt atau updatedAt jika ada
                const ts = latest.createdAt || latest.updatedAt;
                
                if (ts && ts.toDate) {
                    const d = ts.toDate();
                    const day = String(d.getDate()).padStart(2, '0');
                    const month = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"][d.getMonth()];
                    const year = d.getFullYear();
                    dateStr = `${day} ${month} ${year}`;
                    
                    // Format Jam Menit Detik
                    const h = String(d.getHours()).padStart(2, '0');
                    const m = String(d.getMinutes()).padStart(2, '0');
                    const s = String(d.getSeconds()).padStart(2, '0');
                    timeStr = `${h}:${m}:${s}`;
                }

                document.getElementById('header-last-date').innerText = `Terakhir diinput : ${dateStr}`;
                document.getElementById('header-last-pic').innerText = `Oleh : ${latest.pic || '---'}`;
                document.getElementById('header-last-time').innerText = `Waktu : ${timeStr}`;
            }

            updateStats();
            renderInventoryList();
        });

        window.switchTab = (tab) => {
            const views = ['dashboard', 'input', 'history', 'master'];
            views.forEach(v => document.getElementById(`view-${v}`).classList.add('hide'));
            document.getElementById(`view-${tab}`).classList.remove('hide');
            
            const navs = ['dashboard', 'input', 'history'];
            navs.forEach(n => {
                const btn = document.getElementById(`nav-${n}`);
                const tabBtn = document.getElementById(`btn-${n}`);
                if (btn) btn.className = n === tab ? 'p-3 text-blue-600 bg-blue-50 rounded-2xl shadow-inner scale-110' : 'p-3 text-slate-300 transition-all';
                if (tabBtn) tabBtn.className = n === tab ? 'flex-1 py-3.5 text-[10px] font-extrabold uppercase tracking-widest rounded-[1.5rem] tab-active' : 'flex-1 py-3.5 text-[10px] font-extrabold uppercase tracking-widest rounded-[1.5rem] tab-inactive';
            });
            lucide.createIcons();
        };

        window.handleMasterSearch = (val) => {
            const dropdown = document.getElementById('search-dropdown');
            if (val.length < 2) { dropdown.classList.add('hide'); return; }
            const filtered = masterProducts.filter(p => 
                p.sku?.toLowerCase().includes(val.toLowerCase()) || 
                p.itemDescription?.toLowerCase().includes(val.toLowerCase())
            ).slice(0, 10);
            dropdown.innerHTML = filtered.map(p => `
                <div onclick="selectProduct('${p.sku}', '${p.itemDescription.replace(/'/g, "\\'")}')" class="p-5 border-b border-slate-50 hover:bg-blue-50 cursor-pointer flex items-center gap-3 transition-all active:bg-blue-100">
                    <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600"><i data-lucide="package" class="w-5 h-5"></i></div>
                    <div class="flex-1 overflow-hidden">
                        <span class="block font-extrabold text-blue-700 text-sm tracking-tight">${p.sku}</span>
                        <span class="block text-[11px] text-slate-500 font-bold truncate mt-0.5 uppercase">${p.itemDescription}</span>
                    </div>
                </div>
            `).join('');
            dropdown.classList.remove('hide');
            lucide.createIcons();
        };

        window.selectProduct = (sku, desc) => {
            document.getElementById('form-sku').value = sku;
            document.getElementById('form-desc').value = desc;
            document.getElementById('display-sku').innerText = sku;
            document.getElementById('display-desc').innerText = desc;
            document.getElementById('search-dropdown').classList.add('hide');
            document.getElementById('master-search-input').value = '';
            document.getElementById('expiry-form').classList.remove('opacity-40', 'pointer-events-none');
            showNotif("PRODUK DIPILIH", "blue");
        };

        document.getElementById('expiry-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            const id = document.getElementById('form-id').value;
            btn.disabled = true;
            btn.innerText = "...";
            
            const payload = {
                sku: document.getElementById('form-sku').value,
                itemDescription: document.getElementById('form-desc').value,
                qty: parseInt(document.getElementById('form-qty').value),
                pic: document.getElementById('form-pic').value.toUpperCase(),
                expiredDate: document.getElementById('form-date').value,
                updatedAt: serverTimestamp()
            };
            
            try {
                if (id) {
                    await updateDoc(doc(db, "inventory_expired", id), payload);
                    showNotif("DATA DIPERBARUI!", "emerald");
                } else {
                    await addDoc(collection(db, "inventory_expired"), {
                        ...payload,
                        createdAt: serverTimestamp(),
                        notificationFlags: {}
                    });
                    showNotif("DATA TERSIMPAN!", "blue");
                }
                resetForm();
                switchTab('history');
            } catch (err) { showNotif("GAGAL SIMPAN", "red"); } finally { 
                btn.disabled = false;
                btn.innerHTML = id ? '<i data-lucide="edit"></i> UPDATE DATA' : '<i data-lucide="save"></i> SIMPAN DATA';
                lucide.createIcons();
            }
        };

        window.resetForm = () => {
            document.getElementById('expiry-form').reset();
            document.getElementById('form-id').value = '';
            document.getElementById('display-sku').innerText = '---';
            document.getElementById('display-desc').innerText = 'Menunggu pilihan produk';
            document.getElementById('expiry-form').classList.add('opacity-40', 'pointer-events-none');
            document.getElementById('btn-cancel').classList.add('hide');
            document.getElementById('btn-save').innerHTML = '<i data-lucide="save"></i> SIMPAN DATA';
            lucide.createIcons();
        };

        const updateStats = () => {
            const today = new Date().setHours(0,0,0,0);
            const stats = { total: inventoryData.length, expired: 0, h7: 0, h30: 0, h90: 0 };
            inventoryData.forEach(item => {
                const diff = Math.ceil((new Date(item.expiredDate) - today) / 86400000);
                if (diff <= 0) stats.expired++;
                else if (diff <= 7) stats.h7++;
                else if (diff <= 30) stats.h30++;
                else if (diff <= 90) stats.h90++;
            });
            document.getElementById('stat-total').innerText = stats.total;
            document.getElementById('stat-expired').innerText = stats.expired;
            document.getElementById('stat-h7').innerText = stats.h7;
            document.getElementById('stat-h30').innerText = stats.h30;
            document.getElementById('stat-h90').innerText = stats.h90;
            renderDashboardQuickList();
        };

        const renderDashboardQuickList = () => {
            const list = document.getElementById('dashboard-quick-list');
            const today = new Date().setHours(0,0,0,0);
            const sorted = [...inventoryData].sort((a, b) => new Date(a.expiredDate) - new Date(b.expiredDate)).slice(0, 3);
            
            if (sorted.length === 0) {
                list.innerHTML = `<div class="text-center py-8 bg-white/40 rounded-[2rem] border border-dashed border-slate-200"><p class="text-[10px] font-bold text-slate-400 uppercase">Belum ada data monitored</p></div>`;
                return;
            }

            list.innerHTML = sorted.map(item => {
                const diff = Math.ceil((new Date(item.expiredDate) - today) / 86400000);
                let badge = `<span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">${diff} Hari</span>`;
                if (diff <= 0) badge = `<span class="bg-black text-white px-3 py-1 rounded-full text-[9px] font-black uppercase">EXPIRED</span>`;
                else if (diff <= 7) badge = `<span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">BAHAYA</span>`;
                else if (diff <= 30) badge = `<span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">WASPADA</span>`;

                return `
                    <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
                        <div class="flex-1 overflow-hidden pr-2">
                            <div class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1">${item.sku}</div>
                            <div class="text-xs font-extrabold text-slate-800 truncate">${item.itemDescription}</div>
                        </div>
                        <div class="flex items-center gap-2">
                            ${badge}
                            <div class="w-8 h-8 flex items-center justify-center bg-slate-50 rounded-xl text-slate-300" onclick="editEntry('${item.id}')">
                                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        };

        window.renderInventoryList = () => {
            const list = document.getElementById('inventory-list');
            const today = new Date().setHours(0,0,0,0);
            list.innerHTML = inventoryData.map(item => {
                const diff = Math.ceil((new Date(item.expiredDate) - today) / 86400000);
                let colorClass = 'bg-blue-500';
                let tagClass = 'bg-blue-50 text-blue-600';
                if (diff <= 0) { colorClass = 'bg-slate-900'; tagClass='bg-slate-100 text-slate-800'; }
                else if (diff <= 7) { colorClass = 'bg-red-500'; tagClass='bg-red-50 text-red-600'; }
                else if (diff <= 30) { colorClass = 'bg-orange-500'; tagClass='bg-orange-50 text-orange-600'; }

                return `
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col gap-4 relative overflow-hidden group hover:shadow-md transition-all">
                        <div class="absolute top-0 left-0 w-2 h-full ${colorClass}"></div>
                        <div class="flex justify-between items-start pl-3">
                            <div class="flex-1 overflow-hidden pr-4">
                                <div class="text-[10px] font-extrabold text-blue-600 uppercase tracking-widest leading-none mb-1.5">${item.sku}</div>
                                <div class="text-md font-extrabold text-slate-800 leading-tight">${item.itemDescription}</div>
                            </div>
                            <div class="bg-slate-50 px-4 py-2 rounded-2xl font-extrabold text-[10px] border border-slate-100">QTY: ${item.qty}</div>
                        </div>
                        <div class="flex justify-between items-center pt-4 border-t border-slate-50 pl-3">
                            <div class="flex flex-col gap-1">
                                <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-extrabold uppercase tracking-wide ${tagClass}">
                                    <i data-lucide="calendar" class="w-3.5 h-3.5"></i> ${item.expiredDate}
                                </div>
                                <div class="text-[9px] font-bold text-slate-400 uppercase mt-1 pl-1">ID: ${item.pic}</div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="editEntry('${item.id}')" class="p-3 bg-slate-50 text-slate-400 hover:text-blue-600 rounded-2xl active:bg-blue-50 transition-all"><i data-lucide="pencil-line" class="w-4.5 h-4.5"></i></button>
                                <button onclick="deleteEntry('${item.id}')" class="p-3 bg-slate-50 text-slate-300 hover:text-red-500 rounded-2xl active:bg-red-50 transition-all"><i data-lucide="trash-2" class="w-4.5 h-4.5"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        };

        window.editEntry = (id) => {
            const item = inventoryData.find(i => i.id === id);
            if (!item) return;
            switchTab('input');
            document.getElementById('form-id').value = item.id;
            document.getElementById('form-sku').value = item.sku;
            document.getElementById('form-desc').value = item.itemDescription;
            document.getElementById('form-qty').value = item.qty;
            document.getElementById('form-pic').value = item.pic;
            document.getElementById('form-date').value = item.expiredDate;
            document.getElementById('display-sku').innerText = item.sku;
            document.getElementById('display-desc').innerText = item.itemDescription;
            document.getElementById('expiry-form').classList.remove('opacity-40', 'pointer-events-none');
            document.getElementById('btn-cancel').classList.remove('hide');
            document.getElementById('btn-save').innerHTML = '<i data-lucide="edit"></i> UPDATE DATA';
            lucide.createIcons();
        };

        window.deleteEntry = async (id) => {
            if(!confirm("Hapus data ini?")) return;
            try { await deleteDoc(doc(db, "inventory_expired", id)); showNotif("DATA DIHAPUS", "red"); } catch (e) { showNotif("GAGAL HAPUS", "red"); }
        };

        window.renderMasterList = (search = '') => {
            const list = document.getElementById('master-list');
            const filtered = search ? masterProducts.filter(p => p.sku.toLowerCase().includes(search.toLowerCase()) || p.itemDescription.toLowerCase().includes(search.toLowerCase())) : masterProducts.slice(0, 50);
            if(filtered.length === 0) { list.innerHTML = `<div class="text-center py-10 text-slate-300 font-bold text-xs">KOSONG</div>`; return; }
            list.innerHTML = filtered.map((p, idx) => `
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 flex items-center justify-between shadow-sm group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center text-[11px] font-extrabold text-slate-300 group-hover:bg-blue-50 group-hover:text-blue-400 transition-all">${idx+1}</div>
                        <div class="overflow-hidden">
                            <div class="text-[10px] font-extrabold text-blue-600 uppercase leading-none mb-1 tracking-tight">${p.sku}</div>
                            <div class="text-xs font-bold text-slate-800 truncate w-44">${p.itemDescription}</div>
                        </div>
                    </div>
                    <button onclick="deleteMaster('${p.id}')" class="p-3 text-slate-200 hover:text-red-400 transition-all"><i data-lucide="x-circle" class="w-5 h-5"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.deleteMaster = async (id) => {
            if(!confirm("Hapus SKU?")) return;
            try { await deleteDoc(doc(db, "master_products", id)); showNotif("SKU DIHAPUS", "red"); } catch (e) { showNotif("GAGAL", "red"); }
        };

        window.handleCSV = (e) => {
            const file = e.target.files[0];
            const btn = document.getElementById('btn-csv');
            if (!file) return;
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async (results) => {
                    const data = results.data;
                    btn.disabled = true;
                    btn.innerText = "...";
                    try {
                        const chunks = [];
                        for (let i = 0; i < data.length; i += 400) { chunks.push(data.slice(i, i + 400)); }
                        for (const chunk of chunks) {
                            const batch = writeBatch(db);
                            chunk.forEach(row => {
                                const skuKey = Object.keys(row).find(k => k.toLowerCase().includes('sku'));
                                const descKey = Object.keys(row).find(k => k.toLowerCase().includes('desc') || k.toLowerCase().includes('item'));
                                if (row[skuKey] && row[descKey]) {
                                    const newDoc = doc(collection(db, "master_products"));
                                    batch.set(newDoc, { sku: row[skuKey].toString().toUpperCase(), itemDescription: row[descKey], createdAt: serverTimestamp() });
                                }
                            });
                            await batch.commit();
                        }
                        showNotif(`SUKSES IMPORT`, "emerald");
                    } catch (err) { showNotif("IMPORT GAGAL", "red"); } finally {
                        btn.disabled = false;
                        btn.innerHTML = '<i data-lucide="upload-cloud" class="w-3.5 h-3.5"></i> IMPORT';
                        lucide.createIcons();
                        e.target.value = '';
                    }
                }
            });
        };

        lucide.createIcons();
    </script>
</body>
</html>
