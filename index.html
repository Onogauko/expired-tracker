<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expired Tracker Pro</title>
    
    <!-- PWA Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ExpTracker">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2907/2907150.png">
    <meta name="theme-color" content="#2563eb">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
        }
        .tab-active { 
            background-color: #2563eb; 
            color: white; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); 
        }
        .tab-inactive { color: #94a3b8; font-weight: 600; }
        .hide { display: none !important; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        input:focus {
            border-color: #2563eb;
            outline: none;
        }

        .gradient-header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen pb-32">

    <div class="max-w-md mx-auto relative min-h-screen bg-slate-50 border-x border-slate-200 shadow-2xl">
        
        <!-- Header Section - Tetap Proporsional -->
        <header class="gradient-header text-white pt-8 pb-14 px-7 rounded-b-[2.5rem] shadow-xl relative overflow-hidden">
            <div class="absolute -top-10 -right-10 opacity-10 pointer-events-none">
                <i data-lucide="database" size="180"></i>
            </div>
            
            <div class="flex justify-between items-center relative z-10">
                <div class="text-left">
                    <h1 class="text-2xl font-extrabold tracking-tight uppercase leading-none">Expired Tracker</h1>
                    <div class="mt-2 space-y-0.5 opacity-90">
                        <p id="header-last-date" class="text-blue-100 text-[7.5px] font-bold uppercase tracking-wider">Terakhir diinput : ---</p>
                        <p id="header-last-pic" class="text-blue-100 text-[7.5px] font-bold uppercase tracking-wider">Oleh : ---</p>
                        <p id="header-last-time" class="text-blue-100 text-[7.5px] font-bold uppercase tracking-wider">Waktu : ---</p>
                    </div>
                </div>
                
                <button onclick="switchTab('master')" class="p-3 bg-white/10 hover:bg-white/20 rounded-2xl border border-white/20 transition-all active:scale-90 flex flex-col items-center gap-1 z-50">
                    <i data-lucide="database" class="w-5 h-5 text-white"></i>
                    <span class="text-[8px] font-black uppercase tracking-tighter">Database</span>
                </button>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <div class="px-5 -mt-8 mb-4 relative z-20">
            <div class="flex bg-white p-1.5 rounded-2xl shadow-lg border border-slate-100">
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all tab-active">Beranda</button>
                <button onclick="switchTab('input')" id="btn-input" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all tab-inactive">Input</button>
                <button onclick="switchTab('history')" id="btn-history" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all tab-inactive">Laporan</button>
            </div>
        </div>

        <main id="app-content">
            
            <!-- Dashboard View -->
            <section id="view-dashboard" class="px-6 space-y-4 animate-in fade-in duration-500">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm col-span-2 flex justify-between items-center">
                        <div>
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Monitored</p>
                            <div id="stat-total" class="text-3xl font-black text-slate-800">0</div>
                        </div>
                        <div class="p-4 bg-blue-50 text-blue-600 rounded-3xl"><i data-lucide="package" class="w-7 h-7"></i></div>
                    </div>
                    
                    <div class="bg-slate-900 p-5 rounded-[2rem] shadow-sm">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Sudah Expired</p>
                        <div id="stat-expired" class="text-3xl font-black text-white">0</div>
                    </div>

                    <div class="bg-red-50 p-5 rounded-[2rem] border border-red-100 shadow-sm">
                        <p class="text-[9px] font-black text-red-400 uppercase tracking-widest mb-1">H-7 Alert</p>
                        <div id="stat-h7" class="text-3xl font-black text-red-600">0</div>
                    </div>
                    
                    <div class="bg-orange-50 p-5 rounded-[2rem] border border-orange-100 shadow-sm">
                        <p class="text-[9px] font-black text-orange-600 uppercase tracking-widest mb-1">H-30 Alert</p>
                        <div id="stat-h30" class="text-3xl font-black text-orange-700">0</div>
                    </div>

                    <div class="bg-blue-50 p-5 rounded-[2rem] border border-blue-100 shadow-sm">
                        <p class="text-[9px] font-black text-blue-600 uppercase tracking-widest mb-1">H-90 Alert</p>
                        <div id="stat-h90" class="text-3xl font-black text-blue-700">0</div>
                    </div>
                </div>

                <div class="pt-2">
                    <div class="flex justify-between items-center mb-3 px-2">
                        <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Paling Mendesak</h2>
                        <button onclick="switchTab('history')" class="text-[9px] font-bold text-blue-600 uppercase">Lihat Semua</button>
                    </div>
                    <div id="dashboard-quick-list" class="space-y-3"></div>
                </div>
            </section>

            <!-- Input View - DIRAPATKAN (space-y-2) -->
            <section id="view-input" class="hide px-6 space-y-2 animate-in slide-in-from-bottom-4">
                <div class="bg-white p-4 rounded-[2.5rem] shadow-lg border border-slate-100">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 px-2">Cari Nama / SKU</label>
                    <div class="relative">
                        <input type="text" id="master-search-input" oninput="handleMasterSearch(this.value)" placeholder="Ketik minimal 2 huruf..." class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none font-bold text-slate-700 pl-12">
                        <i data-lucide="search" class="absolute left-4 top-4 text-slate-400 w-5 h-5"></i>
                        <div id="search-dropdown" class="absolute w-full mt-2 bg-white border border-slate-200 rounded-2xl shadow-2xl z-50 max-h-60 overflow-y-auto hide"></div>
                    </div>
                </div>

                <form id="expiry-form" class="bg-white p-5 rounded-[2.5rem] shadow-xl space-y-4 border border-slate-100 opacity-40 pointer-events-none transition-all">
                    <input type="hidden" id="form-id">
                    <input type="hidden" id="form-sku">
                    <input type="hidden" id="form-desc">
                    
                    <!-- Detail Produk Terpilih (Rapat & Clean) -->
                    <div class="p-3 bg-slate-50 rounded-2xl border border-slate-200 flex items-start gap-3">
                        <div class="p-2 bg-white rounded-lg shadow-sm text-blue-600 border border-slate-100"><i data-lucide="check-circle-2" class="w-5 h-5"></i></div>
                        <div class="flex-1 overflow-hidden">
                            <div id="display-desc" class="font-extrabold text-[13px] text-slate-800 leading-tight uppercase truncate">Menunggu pilihan produk</div>
                            <div id="display-sku" class="text-[10px] text-slate-400 font-bold mt-1 uppercase tracking-widest">---</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Qty</label>
                            <input type="number" id="form-qty" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">PIC</label>
                            <input type="text" id="form-pic" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold uppercase">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Tanggal Expired</label>
                        <input type="date" id="form-date" required class="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-2xl font-black text-blue-900">
                    </div>

                    <!-- Tombol Simpan Solid & Tegas -->
                    <button type="submit" id="btn-save" class="w-full py-5 bg-blue-600 text-white rounded-3xl font-extrabold text-lg shadow-lg active:scale-95 transition-all">SIMPAN DATA</button>
                    
                    <button type="button" onclick="resetForm()" id="btn-cancel" class="hide w-full text-center text-[10px] font-black text-slate-400 uppercase tracking-widest pt-2">Batal Edit</button>
                </form>
            </section>

            <!-- History View -->
            <section id="view-history" class="hide px-6 space-y-4 animate-in slide-in-from-right-4">
                <div class="flex justify-between items-center px-2">
                    <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Daftar Inventory</div>
                    <i data-lucide="filter" class="w-4 h-4 text-slate-300"></i>
                </div>
                <div id="inventory-list" class="space-y-4"></div>
            </section>

            <!-- Master View -->
            <section id="view-master" class="hide px-6 space-y-4 animate-in fade-in">
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex items-center justify-between gap-3">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black text-slate-400 uppercase">Import CSV</span>
                        <span class="text-[9px] text-blue-500 font-bold">sku, description</span>
                    </div>
                    <input type="file" id="csv-input" accept=".csv" class="hide" onchange="handleCSV(event)">
                    <button onclick="document.getElementById('csv-input').click()" id="btn-csv" class="px-4 py-2 bg-blue-600 text-white rounded-xl font-black text-[10px] flex items-center gap-2 shadow-lg active:scale-95">
                        <i data-lucide="upload" class="w-3.5 h-3.5"></i> PILIH FILE
                    </button>
                </div>

                <div class="relative">
                    <input type="text" oninput="renderMasterList(this.value)" placeholder="Cari SKU di master..." class="w-full p-4 bg-white border border-slate-200 rounded-2xl text-xs font-bold pl-12 shadow-sm">
                    <i data-lucide="search" class="absolute left-4 top-4 text-slate-300 w-4 h-4"></i>
                </div>

                <div class="flex justify-between items-center px-4">
                    <div id="master-count" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">0 SKU Terdaftar</div>
                    <button onclick="switchTab('dashboard')" class="text-[10px] font-black text-blue-600">KEMBALI</button>
                </div>
                <div id="master-list" class="space-y-2"></div>
            </section>

        </main>

        <!-- Bottom Navigation Bar -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 px-8 py-5 flex justify-around items-center z-[100] max-w-md mx-auto rounded-t-[2.5rem] shadow-2xl">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="p-2 text-blue-600 scale-110"><i data-lucide="layout-dashboard" class="w-6 h-6"></i></button>
            <button onclick="switchTab('input')" id="nav-input" class="p-3 text-slate-300 transition-all"><i data-lucide="plus" class="w-6 h-6"></i></button>
            <button onclick="switchTab('history')" id="nav-history" class="p-2 text-slate-300 transition-all"><i data-lucide="history" class="w-6 h-6"></i></button>
        </nav>

        <div id="notif-box" class="hide fixed bottom-24 left-6 right-6 p-4 rounded-2xl shadow-2xl z-[150] text-white font-bold text-xs text-center animate-in slide-in-from-bottom-10"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAf24482S97N82pkopYpj1ZJqdOPiwW9g4",
            authDomain: "expired-tracker-pro.firebaseapp.com",
            projectId: "expired-tracker-pro",
            storageBucket: "expired-tracker-pro.firebasestorage.app",
            messagingSenderId: "610264736832",
            appId: "1:610264736832:web:0838a2477519f4dd952ba5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let masterProducts = [];
        let inventoryData = [];

        const showNotif = (msg, type = 'blue') => {
            const box = document.getElementById('notif-box');
            const colors = { emerald: 'bg-emerald-500', red: 'bg-red-500', blue: 'bg-blue-600' };
            box.className = `${colors[type]} fixed bottom-24 left-6 right-6 p-4 rounded-2xl shadow-2xl z-[150] text-white font-bold text-xs text-center`;
            box.innerText = msg;
            box.classList.remove('hide');
            setTimeout(() => box.classList.add('hide'), 3000);
        };

        onSnapshot(query(collection(db, "master_products"), orderBy("sku")), (snap) => {
            masterProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            document.getElementById('master-count').innerText = `${masterProducts.length} SKU Terdaftar`;
            renderMasterList();
        });

        onSnapshot(query(collection(db, "inventory_expired"), orderBy("createdAt", "desc")), (snap) => {
            inventoryData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            if (inventoryData.length > 0) {
                const latest = inventoryData[0];
                let dateStr = "---";
                let timeStr = "---";
                const ts = latest.createdAt || latest.updatedAt;
                if (ts && ts.toDate) {
                    const d = ts.toDate();
                    const day = String(d.getDate()).padStart(2, '0');
                    const month = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"][d.getMonth()];
                    const year = d.getFullYear();
                    dateStr = `${day} ${month} ${year}`;
                    const h = String(d.getHours()).padStart(2, '0');
                    const m = String(d.getMinutes()).padStart(2, '0');
                    const s = String(d.getSeconds()).padStart(2, '0');
                    timeStr = `${h}:${m}:${s}`;
                }
                document.getElementById('header-last-date').innerText = `Terakhir diinput : ${dateStr}`;
                document.getElementById('header-last-pic').innerText = `Oleh : ${latest.pic || '---'}`;
                document.getElementById('header-last-time').innerText = `Waktu : ${timeStr}`;
            }

            updateStats();
            renderInventoryList();
        });

        window.switchTab = (tab) => {
            const views = ['dashboard', 'input', 'history', 'master'];
            views.forEach(v => document.getElementById(`view-${v}`).classList.add('hide'));
            document.getElementById(`view-${tab}`).classList.remove('hide');
            
            const navs = ['dashboard', 'input', 'history'];
            navs.forEach(n => {
                const btn = document.getElementById(`nav-${n}`);
                const tabBtn = document.getElementById(`btn-${n}`);
                if (btn) btn.className = n === tab ? 'p-2 text-blue-600 scale-110' : 'p-2 text-slate-300';
                if (tabBtn) tabBtn.className = n === tab ? 'flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all tab-active' : 'flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all tab-inactive';
            });
            lucide.createIcons();
        };

        window.handleMasterSearch = (val) => {
            const dropdown = document.getElementById('search-dropdown');
            if (val.length < 2) { dropdown.classList.add('hide'); return; }
            const filtered = masterProducts.filter(p => 
                p.sku?.toLowerCase().includes(val.toLowerCase()) || 
                p.itemDescription?.toLowerCase().includes(val.toLowerCase())
            ).slice(0, 10);
            dropdown.innerHTML = filtered.map(p => `
                <div onclick="selectProduct('${p.sku}', '${p.itemDescription.replace(/'/g, "\\'")}')" class="p-4 border-b border-slate-50 hover:bg-blue-50 cursor-pointer flex flex-col">
                    <span class="font-black text-blue-700 text-sm">${p.sku}</span>
                    <span class="text-xs text-slate-500 font-bold truncate">${p.itemDescription}</span>
                </div>
            `).join('');
            dropdown.classList.remove('hide');
        };

        window.selectProduct = (sku, desc) => {
            document.getElementById('form-sku').value = sku;
            document.getElementById('form-desc').value = desc;
            document.getElementById('display-sku').innerText = sku;
            document.getElementById('display-desc').innerText = desc;
            document.getElementById('search-dropdown').classList.add('hide');
            document.getElementById('master-search-input').value = '';
            document.getElementById('expiry-form').classList.remove('opacity-40', 'pointer-events-none');
            showNotif("PRODUK DIPILIH", "blue");
        };

        document.getElementById('expiry-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            const id = document.getElementById('form-id').value;
            btn.innerText = "MEMPROSES...";
            const payload = {
                sku: document.getElementById('form-sku').value,
                itemDescription: document.getElementById('form-desc').value,
                qty: parseInt(document.getElementById('form-qty').value),
                pic: document.getElementById('form-pic').value.toUpperCase(),
                expiredDate: document.getElementById('form-date').value,
                updatedAt: serverTimestamp()
            };
            try {
                if (id) {
                    await updateDoc(doc(db, "inventory_expired", id), payload);
                    showNotif("Data diperbarui!", "emerald");
                } else {
                    await addDoc(collection(db, "inventory_expired"), {
                        ...payload,
                        createdAt: serverTimestamp(),
                        notificationFlags: {}
                    });
                    showNotif("Data disimpan!", "blue");
                }
                resetForm();
                switchTab('history');
            } catch (err) { showNotif("Gagal simpan", "red"); } finally { btn.innerText = id ? "UPDATE DATA" : "SIMPAN DATA"; }
        };

        window.resetForm = () => {
            document.getElementById('expiry-form').reset();
            document.getElementById('form-id').value = '';
            document.getElementById('display-sku').innerText = '---';
            document.getElementById('display-desc').innerText = 'Menunggu pilihan produk';
            document.getElementById('expiry-form').classList.add('opacity-40', 'pointer-events-none');
            document.getElementById('btn-cancel').classList.add('hide');
            document.getElementById('btn-save').innerText = 'SIMPAN DATA';
        };

        const updateStats = () => {
            const today = new Date().setHours(0,0,0,0);
            const stats = { total: inventoryData.length, expired: 0, h7: 0, h30: 0, h90: 0 };
            inventoryData.forEach(item => {
                const diff = Math.ceil((new Date(item.expiredDate) - today) / 86400000);
                if (diff <= 0) stats.expired++;
                else if (diff <= 7) stats.h7++;
                else if (diff <= 30) stats.h30++;
                else if (diff <= 90) stats.h90++;
            });
            document.getElementById('stat-total').innerText = stats.total;
            document.getElementById('stat-expired').innerText = stats.expired;
            document.getElementById('stat-h7').innerText = stats.h7;
            document.getElementById('stat-h30').innerText = stats.h30;
            document.getElementById('stat-h90').innerText = stats.h90;
            renderDashboardQuickList();
        };

        const renderDashboardQuickList = () => {
            const list = document.getElementById('dashboard-quick-list');
            const today = new Date().setHours(0,0,0,0);
            const sorted = [...inventoryData].sort((a, b) => new Date(a.expiredDate) - new Date(b.expiredDate)).slice(0, 3);
            if (sorted.length === 0) {
                list.innerHTML = `<div class="text-center py-8 bg-white/40 rounded-[2rem] border border-dashed border-slate-200"><p class="text-[10px] font-bold text-slate-400 uppercase">Belum ada data monitored</p></div>`;
                return;
            }
            list.innerHTML = sorted.map(item => {
                const diff = Math.ceil((new Date(item.expiredDate) - today) / 86400000);
                let badge = `<span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">${diff} Hari</span>`;
                if (diff <= 0) badge = `<span class="bg-black text-white px-3 py-1 rounded-full text-[9px] font-black uppercase">EXPIRED</span>`;
                else if (diff <= 7) badge = `<span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">BAHAYA</span>`;
                else if (diff <= 30) badge = `<span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">WASPADA</span>`;
                return `<div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between"><div class="flex-1 overflow-hidden pr-2"><div class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1">${item.sku}</div><div class="text-xs font-extrabold text-slate-800 truncate">${item.itemDescription}</div></div><div class="flex items-center gap-2">${badge}<div class="w-8 h-8 flex items-center justify-center bg-slate-50 rounded-xl text-slate-300" onclick="editEntry('${item.id}')"><i data-lucide="chevron-right" class="w-4 h-4"></i></div></div></div>`;
            }).join('');
            lucide.createIcons();
        };

        window.renderInventoryList = () => {
            const list = document.getElementById('inventory-list');
            const today = new Date().setHours(0,0,0,0);
            list.innerHTML = inventoryData.map(item => {
                const diff = Math.ceil((new Date(item.expiredDate) - today) / 86400000);
                let colorClass = 'bg-blue-500';
                let tagClass = 'bg-blue-50 text-blue-600';
                if (diff <= 0) { colorClass = 'bg-slate-900'; tagClass='bg-slate-100 text-slate-800'; }
                else if (diff <= 7) { colorClass = 'bg-red-500'; tagClass='bg-red-50 text-red-600'; }
                else if (diff <= 30) { colorClass = 'bg-orange-500'; tagClass='bg-orange-50 text-orange-600'; }
                return `
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col gap-4 relative overflow-hidden group">
                        <div class="absolute top-0 left-0 w-2 h-full ${colorClass}"></div>
                        <div class="flex justify-between items-start pl-3">
                            <div class="flex-1 overflow-hidden pr-4">
                                <div class="text-[10px] font-extrabold text-blue-600 uppercase tracking-widest leading-none mb-1.5">${item.sku}</div>
                                <div class="text-md font-extrabold text-slate-800 leading-tight">${item.itemDescription}</div>
                            </div>
                            <div class="bg-slate-50 px-4 py-2 rounded-2xl font-extrabold text-[10px] border border-slate-100">QTY: ${item.qty}</div>
                        </div>
                        <div class="flex justify-between items-center pt-4 border-t border-slate-50 pl-3">
                            <div class="flex flex-col gap-1">
                                <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-extrabold uppercase tracking-wide ${tagClass}">
                                    <i data-lucide="calendar" class="w-3.5 h-3.5"></i> ${item.expiredDate}
                                </div>
                                <div class="text-[9px] font-bold text-slate-400 uppercase mt-1 pl-1">ID: ${item.pic}</div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="editEntry('${item.id}')" class="p-3 bg-slate-50 text-slate-400 hover:text-blue-600 rounded-2xl active:bg-blue-50 transition-all"><i data-lucide="edit-3" class="w-4.5 h-4.5"></i></button>
                                <button onclick="deleteEntry('${item.id}')" class="p-3 bg-slate-50 text-slate-300 hover:text-red-500 rounded-2xl active:bg-red-50 transition-all"><i data-lucide="trash-2" class="w-4.5 h-4.5"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        };

        window.editEntry = (id) => {
            const item = inventoryData.find(i => i.id === id); if (!item) return;
            switchTab('input');
            document.getElementById('form-id').value = item.id;
            document.getElementById('form-sku').value = item.sku;
            document.getElementById('form-desc').value = item.itemDescription;
            document.getElementById('form-qty').value = item.qty;
            document.getElementById('form-pic').value = item.pic;
            document.getElementById('form-date').value = item.expiredDate;
            document.getElementById('display-sku').innerText = item.sku;
            document.getElementById('display-desc').innerText = item.itemDescription;
            document.getElementById('expiry-form').classList.remove('opacity-40', 'pointer-events-none');
            document.getElementById('btn-cancel').classList.remove('hide');
            document.getElementById('btn-save').innerText = 'UPDATE DATA';
        };

        window.deleteEntry = async (id) => {
            if(!confirm("Hapus data ini?")) return;
            try { await deleteDoc(doc(db, "inventory_expired", id)); showNotif("DATA DIHAPUS", "red"); } catch (e) { showNotif("GAGAL HAPUS", "red"); }
        };

        window.renderMasterList = (search = '') => {
            const list = document.getElementById('master-list');
            const filtered = search ? masterProducts.filter(p => p.sku.toLowerCase().includes(search.toLowerCase()) || p.itemDescription.toLowerCase().includes(search.toLowerCase())) : masterProducts.slice(0, 50);
            if(filtered.length === 0) { list.innerHTML = `<div class="text-center py-10 text-slate-300 font-bold text-xs">KOSONG</div>`; return; }
            list.innerHTML = filtered.map((p, idx) => `
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 flex items-center justify-between shadow-sm group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center text-[11px] font-extrabold text-slate-300 group-hover:bg-blue-50 group-hover:text-blue-400 transition-all">${idx+1}</div>
                        <div class="overflow-hidden">
                            <div class="text-[10px] font-extrabold text-blue-600 uppercase leading-none mb-1 tracking-tight">${p.sku}</div>
                            <div class="text-xs font-bold text-slate-800 truncate w-44">${p.itemDescription}</div>
                        </div>
                    </div>
                    <button onclick="deleteMaster('${p.id}')" class="p-3 text-slate-200 hover:text-red-400 transition-all"><i data-lucide="x-circle" class="w-5 h-5"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.deleteMaster = async (id) => {
            if(!confirm("Hapus SKU?")) return;
            try { await deleteDoc(doc(db, "master_products", id)); showNotif("SKU DIHAPUS", "red"); } catch (e) { showNotif("GAGAL", "red"); }
        };

        window.handleCSV = (e) => {
            const file = e.target.files[0];
            const btn = document.getElementById('btn-csv');
            if (!file) return;
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async (results) => {
                    const data = results.data;
                    btn.disabled = true;
                    btn.innerText = "...";
                    try {
                        const chunks = [];
                        for (let i = 0; i < data.length; i += 400) { chunks.push(data.slice(i, i + 400)); }
                        for (const chunk of chunks) {
                            const batch = writeBatch(db);
                            chunk.forEach(row => {
                                const skuKey = Object.keys(row).find(k => k.toLowerCase().includes('sku'));
                                const descKey = Object.keys(row).find(k => k.toLowerCase().includes('desc') || k.toLowerCase().includes('item'));
                                if (row[skuKey] && row[descKey]) {
                                    const newDoc = doc(collection(db, "master_products"));
                                    batch.set(newDoc, { sku: row[skuKey].toString().toUpperCase(), itemDescription: row[descKey], createdAt: serverTimestamp() });
                                }
                            });
                            await batch.commit();
                        }
                        showNotif(`SUKSES IMPORT`, "emerald");
                    } catch (err) { showNotif("GAGAL", "red"); } finally {
                        btn.disabled = false;
                        btn.innerHTML = '<i data-lucide="upload" class="w-3.5 h-3.5"></i> PILIH FILE';
                        lucide.createIcons();
                        e.target.value = '';
                    }
                }
            });
        };
        lucide.createIcons();
    </script>
</body>
</html>
